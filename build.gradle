import groovy.json.JsonOutput

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

def generatedWireResources = layout.buildDirectory.dir("generated/wireResources")
def wireMaterials = [
        "tin", "lead", "nickel", "copper", "iron", "steel", "gold", "electrum",
        "tungsten", "titanium", "ntt_alloy", "neutronium", "nbb_alloy"
]
def wireGauges = [
        [millimeters: 1, pixels: 2],
        [millimeters: 2, pixels: 4],
        [millimeters: 4, pixels: 6],
        [millimeters: 8, pixels: 8],
        [millimeters: 16, pixels: 10]
]
def wireCoatings = ["bare", "coated"]
def coatingIngredients = [
        tin       : "minecraft:paper",
        lead      : "minecraft:paper",
        nickel    : "minecraft:paper",
        copper    : "gridengineering:rubber",
        iron      : "gridengineering:rubber",
        steel     : "gridengineering:polyethylene",
        gold      : "gridengineering:polyethylene",
        electrum  : "gridengineering:polyethylene",
        tungsten  : "gridengineering:polypropylene",
        titanium  : "gridengineering:polypropylene",
        ntt_alloy : "gridengineering:polypropylene",
        neutronium: "gridengineering:polyetheretherketone",
        nbb_alloy : "gridengineering:polyetheretherketone"
]

def generateWireResources = tasks.register("generateWireResources") {
    outputs.dir(generatedWireResources)

    doLast {
        File root = generatedWireResources.get().asFile
        root.deleteDir()
        root.mkdirs()
        def writeJson = { String relativePath, Object value ->
            File target = new File(root, relativePath)
            target.parentFile.mkdirs()
            target.setText(JsonOutput.prettyPrint(JsonOutput.toJson(value)) + System.lineSeparator(), "UTF-8")
        }
        def wireId = { String material, int millimeters, String coating ->
            (coating == "coated" ? "coated_" : "") +
                    material + "_wire" +
                    (millimeters == 1 ? "" : "_" + millimeters + "mm")
        }
        def element = {
            List<Integer> from,
            List<Integer> to,
            String texture,
            Integer tintIndex ->
            def faces = [:]
            ["down", "up", "north", "south", "west", "east"].each { face ->
                faces[face] = [texture: texture]
                if (tintIndex != null) {
                    faces[face].tintindex = tintIndex
                }
            }
            [from: from, to: to, faces: faces]
        }
        def blockModel = { List elements, Map textures ->
            [
                    parent          : "minecraft:block/block",
                    ambientocclusion: false,
                    textures        : textures,
                    elements        : elements
            ]
        }
        def coatedShell = {
            String axis,
            int longitudinalMinimum,
            int longitudinalMaximum,
            int innerMinimum,
            int innerMaximum,
            int outerMinimum,
            int outerMaximum ->
            def shell = []
            if (axis == "x") {
                shell.add(element(
                        [longitudinalMinimum, outerMinimum, outerMinimum],
                        [longitudinalMaximum, innerMinimum, outerMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [longitudinalMinimum, innerMaximum, outerMinimum],
                        [longitudinalMaximum, outerMaximum, outerMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [longitudinalMinimum, innerMinimum, outerMinimum],
                        [longitudinalMaximum, innerMaximum, innerMinimum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [longitudinalMinimum, innerMinimum, innerMaximum],
                        [longitudinalMaximum, innerMaximum, outerMaximum],
                        "#coating",
                        null
                ))
            } else if (axis == "y") {
                shell.add(element(
                        [outerMinimum, longitudinalMinimum, outerMinimum],
                        [innerMinimum, longitudinalMaximum, outerMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [innerMaximum, longitudinalMinimum, outerMinimum],
                        [outerMaximum, longitudinalMaximum, outerMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [innerMinimum, longitudinalMinimum, outerMinimum],
                        [innerMaximum, longitudinalMaximum, innerMinimum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [innerMinimum, longitudinalMinimum, innerMaximum],
                        [innerMaximum, longitudinalMaximum, outerMaximum],
                        "#coating",
                        null
                ))
            } else {
                shell.add(element(
                        [outerMinimum, outerMinimum, longitudinalMinimum],
                        [innerMinimum, outerMaximum, longitudinalMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [innerMaximum, outerMinimum, longitudinalMinimum],
                        [outerMaximum, outerMaximum, longitudinalMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [innerMinimum, outerMinimum, longitudinalMinimum],
                        [innerMaximum, innerMinimum, longitudinalMaximum],
                        "#coating",
                        null
                ))
                shell.add(element(
                        [innerMinimum, innerMaximum, longitudinalMinimum],
                        [innerMaximum, outerMaximum, longitudinalMaximum],
                        "#coating",
                        null
                ))
            }
            shell
        }

        wireGauges.each { gauge ->
            int millimeters = gauge.millimeters as int
            int pixels = gauge.pixels as int
            int minimum = 8 - pixels.intdiv(2)
            int maximum = 8 + pixels.intdiv(2)
            String modelBase = "wire_${millimeters}mm"
            def textures = [wire: "gridengineering:block/cable", particle: "#wire"]
            def model = { List<Integer> from, List<Integer> to, int tintIndex ->
                blockModel([element(from, to, "#wire", tintIndex)], textures)
            }

            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_core.json",
                    model([minimum, minimum, minimum], [maximum, maximum, maximum], 6)
            )
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_arm_north.json",
                    model([minimum, minimum, 0], [maximum, maximum, minimum], 0)
            )
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_arm_east.json",
                    model([maximum, minimum, minimum], [16, maximum, maximum], 1)
            )
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_arm_south.json",
                    model([minimum, minimum, maximum], [maximum, maximum, 16], 2)
            )
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_arm_west.json",
                    model([0, minimum, minimum], [minimum, maximum, maximum], 3)
            )
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_arm_up.json",
                    model([minimum, maximum, minimum], [maximum, 16, maximum], 4)
            )
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_arm_down.json",
                    model([minimum, 0, minimum], [maximum, minimum, maximum], 5)
            )

            def inventoryModel = model([0, minimum, minimum], [16, maximum, maximum], 6)
            inventoryModel.display = [
                    gui                  : [rotation: [30, 225, 0], scale: [0.9, 0.9, 0.9]],
                    ground               : [translation: [0, 3, 0], scale: [0.5, 0.5, 0.5]],
                    fixed                : [rotation: [0, 90, 0], scale: [0.75, 0.75, 0.75]],
                    firstperson_righthand : [rotation: [0, 45, 0], translation: [0, 2, 0], scale: [0.8, 0.8, 0.8]],
                    thirdperson_righthand : [rotation: [0, 45, 0], translation: [0, 2.5, 0], scale: [0.55, 0.55, 0.55]]
            ]
            writeJson(
                    "assets/gridengineering/models/block/${modelBase}_inventory.json",
                    inventoryModel
            )

            int coatedMinimum = minimum - 1
            int coatedMaximum = maximum + 1
            String coatedModelBase = "coated_${modelBase}"
            def coatedTextures = [
                    wire    : "gridengineering:block/cable",
                    coating : "gridengineering:block/coating",
                    particle: "#coating"
            ]
            writeJson(
                    "assets/gridengineering/models/block/${coatedModelBase}_core.json",
                    blockModel(
                            [element(
                                    [coatedMinimum, coatedMinimum, coatedMinimum],
                                    [coatedMaximum, coatedMaximum, coatedMaximum],
                                    "#coating",
                                    null
                            )],
                            coatedTextures
                    )
            )

            def coatedArms = [
                    north: [
                            axis: "z",
                            longitudinalMinimum: 0,
                            longitudinalMaximum: coatedMinimum,
                            wireFrom: [minimum, minimum, 0],
                            wireTo: [maximum, maximum, minimum],
                            tintIndex: 0
                    ],
                    east: [
                            axis: "x",
                            longitudinalMinimum: coatedMaximum,
                            longitudinalMaximum: 16,
                            wireFrom: [maximum, minimum, minimum],
                            wireTo: [16, maximum, maximum],
                            tintIndex: 1
                    ],
                    south: [
                            axis: "z",
                            longitudinalMinimum: coatedMaximum,
                            longitudinalMaximum: 16,
                            wireFrom: [minimum, minimum, maximum],
                            wireTo: [maximum, maximum, 16],
                            tintIndex: 2
                    ],
                    west: [
                            axis: "x",
                            longitudinalMinimum: 0,
                            longitudinalMaximum: coatedMinimum,
                            wireFrom: [0, minimum, minimum],
                            wireTo: [minimum, maximum, maximum],
                            tintIndex: 3
                    ],
                    up: [
                            axis: "y",
                            longitudinalMinimum: coatedMaximum,
                            longitudinalMaximum: 16,
                            wireFrom: [minimum, maximum, minimum],
                            wireTo: [maximum, 16, maximum],
                            tintIndex: 4
                    ],
                    down: [
                            axis: "y",
                            longitudinalMinimum: 0,
                            longitudinalMaximum: coatedMinimum,
                            wireFrom: [minimum, 0, minimum],
                            wireTo: [maximum, minimum, maximum],
                            tintIndex: 5
                    ]
            ]
            coatedArms.each { direction, arm ->
                def elements = [
                        element(arm.wireFrom, arm.wireTo, "#wire", arm.tintIndex as Integer)
                ]
                elements.addAll(coatedShell(
                        arm.axis as String,
                        arm.longitudinalMinimum as int,
                        arm.longitudinalMaximum as int,
                        minimum,
                        maximum,
                        coatedMinimum,
                        coatedMaximum
                ))
                writeJson(
                        "assets/gridengineering/models/block/${coatedModelBase}_arm_${direction}.json",
                        blockModel(elements, coatedTextures)
                )
            }

            def coatedInventoryElements = [
                    element([0, minimum, minimum], [16, maximum, maximum], "#wire", 6)
            ]
            coatedInventoryElements.addAll(coatedShell(
                    "x",
                    0,
                    16,
                    minimum,
                    maximum,
                    coatedMinimum,
                    coatedMaximum
            ))
            def coatedInventoryModel = blockModel(coatedInventoryElements, coatedTextures)
            coatedInventoryModel.display = inventoryModel.display
            writeJson(
                    "assets/gridengineering/models/block/${coatedModelBase}_inventory.json",
                    coatedInventoryModel
            )
        }

        def wireTagValues = []
        wireCoatings.each { coating ->
            wireMaterials.each { material ->
                wireGauges.each { gauge ->
                    int millimeters = gauge.millimeters as int
                    String id = wireId(material, millimeters, coating)
                    String modelBase = (coating == "coated" ? "coated_" : "") +
                            "wire_${millimeters}mm"
                    wireTagValues.add("gridengineering:${id}")

                    writeJson(
                            "assets/gridengineering/blockstates/${id}.json",
                            [
                                    multipart: [
                                            [apply: [model: "gridengineering:block/${modelBase}_core"]],
                                            [when: [north: "true"], apply: [model: "gridengineering:block/${modelBase}_arm_north"]],
                                            [when: [east: "true"], apply: [model: "gridengineering:block/${modelBase}_arm_east"]],
                                            [when: [south: "true"], apply: [model: "gridengineering:block/${modelBase}_arm_south"]],
                                            [when: [west: "true"], apply: [model: "gridengineering:block/${modelBase}_arm_west"]],
                                            [when: [up: "true"], apply: [model: "gridengineering:block/${modelBase}_arm_up"]],
                                            [when: [down: "true"], apply: [model: "gridengineering:block/${modelBase}_arm_down"]]
                                    ]
                            ]
                    )
                    writeJson(
                            "assets/gridengineering/models/item/${id}.json",
                            [parent: "gridengineering:block/${modelBase}_inventory"]
                    )
                    writeJson(
                            "data/gridengineering/loot_table/blocks/${id}.json",
                            [
                                    type : "minecraft:block",
                                    pools: [[
                                                    bonus_rolls: 0,
                                                    conditions : [[condition: "minecraft:survives_explosion"]],
                                                    entries    : [[type: "minecraft:item", name: "gridengineering:${id}"]],
                                                    rolls      : 1
                                            ]]
                            ]
                    )
                }
            }
        }

        wireMaterials.each { material ->
            wireGauges.each { gauge ->
                int millimeters = gauge.millimeters as int
                String bareId = wireId(material, millimeters, "bare")
                String coatedId = wireId(material, millimeters, "coated")
                writeJson(
                        "data/gridengineering/recipe/${coatedId}.json",
                        [
                                type       : "minecraft:crafting_shapeless",
                                category   : "redstone",
                                ingredients: [
                                        [item: "gridengineering:${bareId}"],
                                        [item: coatingIngredients[material]]
                                ],
                                result     : [id: "gridengineering:${coatedId}", count: 1]
                        ]
                )
            }

            for (int index = 0; index < wireGauges.size() - 1; index++) {
                int lower = wireGauges[index].millimeters as int
                int higher = wireGauges[index + 1].millimeters as int
                String lowerId = wireId(material, lower, "bare")
                String higherId = wireId(material, higher, "bare")

                writeJson(
                        "data/gridengineering/recipe/${material}_wire_${lower}mm_to_${higher}mm.json",
                        [
                                type       : "minecraft:crafting_shapeless",
                                category   : "redstone",
                                ingredients: [
                                        [item: "gridengineering:${lowerId}"],
                                        [item: "gridengineering:${lowerId}"]
                                ],
                                result     : [id: "gridengineering:${higherId}", count: 1]
                        ]
                )
                writeJson(
                        "data/gridengineering/recipe/${material}_wire_${higher}mm_to_${lower}mm.json",
                        [
                                type       : "minecraft:crafting_shapeless",
                                category   : "redstone",
                                ingredients: [[item: "gridengineering:${higherId}"]],
                                result     : [id: "gridengineering:${lowerId}", count: 2]
                        ]
                )
            }
        }

        writeJson(
                "data/gridengineering/tags/block/wires.json",
                [replace: false, values: wireTagValues]
        )
    }
}

sourceSets.main.resources.srcDir(generatedWireResources)

repositories {
    maven {
        name = 'ModMaven'
        url = 'https://modmaven.dev/'
    }
    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    compileOnly "mekanism:Mekanism:${mekanism_version}:api"
    localRuntime "mekanism:Mekanism:${mekanism_version}"

    localRuntime "maven.modrinth:emi:${emi_version}"
    compileOnly "maven.modrinth:jade:${jade_version}"
    localRuntime "maven.modrinth:jade:${jade_version}"

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    // localRuntime "mezz.jei:jei-${mc_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
tasks.named("processResources").configure {
    dependsOn generateWireResources
}
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
